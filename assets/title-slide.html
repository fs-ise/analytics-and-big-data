<section id="$idprefix$title-slide" class="title-slide slide level1">
  <h1 class="title">$title$</h1>

  <p></p>$if(session)$ $session$:$endif$ $if(subtitle)$$subtitle$ $endif$</p>

  $if(author)$
  <p class="author">$for(author)$$author$$sep$, $endfor$</p>
  $endif$
  $if(date)$<p class="date">($date$)</p>$endif$

</section>
