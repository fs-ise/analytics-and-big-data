project:
  type: website
  title: "Big Data and Analytics"
  output-dir: _site 
  post-render: "bash scripts/decktape.sh"
format:
  revealjs:
    author: "Prof. Dr. Gerit Wagner"
    theme: simple
    width: 1600
    height: 900
    lazy-load: true
    slide-number: true
    include-before-body: assets/header.html
    css: [assets/frankfurt.css]
    auto-stretch: false
    slide-level: 2
    title-slide-attributes:
      data-state: "hide-menubar"
    center: false
    section-divs: true
    simplemenu:
      barhtml:
        header: ""
        footer: "<div class='menubar'><ul class='menu'></ul><div class='slide-number'></div></div>"
      scale: 0.67

revealjs-plugins:
  - simplemenu