project:
  type: website
  title: "Analytics & Big Data"
  output-dir: _site
  # post-render: "bash scripts/decktape.sh"

website:

  site-url: https://fs-ise.github.io/big-data-analytics/
  repo-url: https://github.com/fs-ise/big-data-analytics
  repo-actions: [edit, issue]
  navbar:
    right:
      - text: "Overview"
        href: index.qmd
      - text: "Group work"
        href: group_work.qmd
      - text: "Syllabus"
        href: syllabus.qmd
      - text: "Teaching notes"
        href: teaching_notes.qmd
      - text: "⚠️ Preparation"
        href: preparation.qmd

format:
  html:
    toc: false
    number-sections: false

bibliography: assets/references.bib
csl: assets/apa.csl

filters:
  - custom-callout

custom-callout:
  resource:
    title: "Resource"
    icon: true
    icon-symbol: "🔗"
    color: "#0d6efd"
  confidential:
    title: "Confidential"
    icon: true
    icon-symbol: "🔒"
    color: "#dc3545"
  objective:
    title: "Objective"
    icon: true
    icon-symbol: "🎯"
    color: "#0d6efd"
  self-service:
    title: "Self-service"
    icon: true
    icon-symbol: "🛠️"
    color: "#198754"
